service: lambda-feedback

frameworkVersion: '3'

provider:
  name: aws
  runtime: java25
  region: us-east-2

  # VPC Configuration - Lambda precisa estar na mesma VPC do RDS
  vpc:
    securityGroupIds:
      - !GetAtt LambdaSecurityGroup.GroupId
    subnetIds:
      - subnet-0ee0a1dd869db04c7
      - subnet-0da578789a8cb50e6

  httpApi:
    authorizers:
      lambdaAuthorizer:
        type: request
        functionArn: arn:aws:lambda:us-east-2:990773979941:function:lambda-authorizer
        enableSimpleResponses: true

  environment:
    SNS_TOPIC_ARN:
      Ref: FeedbackCriticoTopic

    TARGET_FUNCTION_NAME: arn:aws:lambda:us-east-2:990773979941:function:lambda-armazena-feedback-dev-armazenaFeedback

    # RDS PostgreSQL Configuration
    DB_HOST: ${env:DB_HOST}
    DB_USER: ${env:DB_MASTER_USERNAME}
    DB_PASSWORD: ${env:DB_MASTER_PASSWORD}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - sns:Publish
          Resource:
            Ref: FeedbackCriticoTopic

        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource:
            - arn:aws:lambda:us-east-2:990773979941:function:lambda-armazena-feedback-dev-armazenaFeedback

package:
  artifact: target/function.zip

functions:
  feedback:
    handler: io.quarkus.amazon.lambda.runtime.QuarkusStreamHandler::handleRequest

    events:
      - httpApi:
          path: /avaliacao
          method: post

          authorizer:
            name: lambdaAuthorizer

resources:
  Resources:
    LambdaSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Security group for lambda-feedback (egress only, DB access controlled by RDS SG)
        VpcId: vpc-0007750f59de0bdd0
        SecurityGroupEgress:
          - IpProtocol: -1
            CidrIp: 0.0.0.0/0

    FeedbackCriticoTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: feedback-critico

    FeedbackEmailSubscription:
      Type: AWS::SNS::Subscription
      Properties:
        TopicArn:
          Ref: FeedbackCriticoTopic
        Protocol: email
        Endpoint: RM368441@fiap.com.br

  Outputs:
    LambdaSecurityGroupId:
      Description: Security Group created for lambda-feedback
      Value:
        Fn::GetAtt:
          - LambdaSecurityGroup
          - GroupId
      Export:
        Name: lambda-feedback-LambdaSecurityGroupId

